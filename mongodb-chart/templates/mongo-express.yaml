apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mongo-express-deployment
  labels:
    app.kubernetes.io/name: mongo-express
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo-express
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-express
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: mongo-express
        image: "{{ .Values.mongoExpress.image.repository }}:{{ .Values.mongoExpress.image.tag }}"
        imagePullPolicy: {{ .Values.mongoExpress.image.pullPolicy }}
        ports:
        - containerPort: 8081
        env:
        - name: ME_CONFIG_MONGODB_ADMINUSERNAME
          valueFrom:
           secretKeyRef:
            name: {{ .Release.Name }}-mongodb-secret
            key: mongodb-root-username
        - name: ME_CONFIG_MONGODB_ADMINPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-mongodb-secret
              key: mongodb-root-password
        - name: ME_CONFIG_MONGODB_SERVER
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-mongodb-configmap
              key: database_URL

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongo-express-service
  labels:
    app.kubernetes.io/name: mongo-express
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: mongo-express
    app.kubernetes.io/instance: {{ .Release.Name }}
  type: {{ .Values.mongoExpress.service.type }}
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: {{ .Values.mongoExpress.service.nodePort }}
